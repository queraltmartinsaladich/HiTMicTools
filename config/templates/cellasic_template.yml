# HiTMicTools — ASCT_cellasic pipeline config template
# Microfluidic CellAsic pipeline with per-frame ID-block crop for drift correction
#
# Usage:
#   hitmic --config cellasic_template.yml
#   hitmic --config cellasic_template.yml --worklist /path/to/worklist.txt

# ── Input / output ─────────────────────────────────────────────────────────────
input_data:
  input_folder: /path/to/input
  output_folder: /path/to/output
  file_type: nd2                         # nd2 | tif | czi
  file_pattern: null
  export_labelled_masks: true
  export_aligned_image: false
  export_training_crops: false
  training_crop_size: 64

# ── Pipeline setup ─────────────────────────────────────────────────────────────
pipeline_setup:
  name: ASCT_cellasic
  reference_channel: 0
  pi_channel: 1
  align_frames: true
  method: basicpy_fl
  focus_correction: true
  parallel_processing: false
  num_workers: 1
  tracking: true
  compile_models: false
  species: ecoli                         # ecoli | p_aeruginosa | m_tuberculosis | m_abscessus | m_chimaera | s_aureus
  # pi_snr_threshold: 3.0             # enable PI classification: piPOS if snr > threshold
  #                                   # snr = (cell_mean - bg) / bg_std; 3.0 for PI staining, 5.0+ for constitutive GFP

# ── Models ─────────────────────────────────────────────────────────────────────
models:
  model_collection: /scicore/home/boeluc00/martin0088/models/model_collection_cellasic.zip

# ── Tracking — cellasic bundle has no config_tracker.yml, must use hungarian ───
tracking:
  backend: hungarian
  parameters:
    max_distance: 25.0
    gap_bridge_frames: 3
  # reconcile_lineage:             # tune if false-positives near lysis; omit = use defaults
  #   area_drop_frac: 0.40         # min fractional area drop to flag as division parent
  #   area_conservation_tol: 0.30  # tolerance on daughter+parent area vs parent area
  #   centroid_dist_frac: 2.0      # daughter must be within N × parent major axis length

# ── Extra kwargs ───────────────────────────────────────────────────────────────
# extra:
#   some_flag: true
